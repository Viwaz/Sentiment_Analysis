services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sentiment_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: sentiment_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./Database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
volumes:
  db_data: